<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ CALCULUX · премиум калькулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1b2f 0%, #2d1f3f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Анимированный фон */
        .gradient-bg {
            position: fixed;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle at 30% 50%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        /* Плавающие частицы */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-100vh) rotate(360deg); }
        }

        .calculator {
            background: rgba(22, 23, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                        0 0 30px rgba(147, 51, 234, 0.3);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .calculator:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                        0 0 50px rgba(147, 51, 234, 0.5);
        }

        /* Премиум индикатор */
        .premium-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        .premium-text {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        .premium-text span {
            color: white;
            font-weight: 700;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .time-indicator {
            margin-left: auto;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Дисплей */
        .display-container {
            background: rgba(10, 11, 20, 0.6);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .expression {
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            min-height: 28px;
            text-align: right;
            font-weight: 400;
            letter-spacing: 0.5px;
            word-wrap: break-word;
            transition: all 0.2s ease;
        }

        .result {
            color: white;
            font-size: 64px;
            font-weight: 500;
            text-align: right;
            line-height: 1.2;
            word-wrap: break-word;
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
            animation: resultPop 0.2s ease;
        }

        @keyframes resultPop {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Память */
        .memory-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
        }

        .memory-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .memory-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .memory-btn:hover {
            color: white;
            background: rgba(147, 51, 234, 0.1);
        }

        .memory-btn:hover::before {
            width: 200px;
            height: 200px;
        }

        .memory-btn:active {
            transform: scale(0.95);
        }

        .memory-value {
            color: #9333ea;
            font-weight: bold;
            margin-left: 5px;
        }

        /* Кнопки */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            aspect-ratio: 1;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 28px;
            font-weight: 400;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
            transition: 0.05s;
        }

        .btn.operator {
            background: linear-gradient(135deg, #9333ea20, #4f46e520);
            color: #c4b5fd;
            font-size: 32px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }

        .btn.operator:hover {
            background: linear-gradient(135deg, #9333ea40, #4f46e540);
            color: white;
            border-color: rgba(147, 51, 234, 0.4);
        }

        .btn.function {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn.function:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn.equals {
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            color: white;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(147, 51, 234, 0.4);
            border: none;
        }

        .btn.equals:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(147, 51, 234, 0.6);
        }

        .btn.zero {
            grid-column: span 2;
            aspect-ratio: auto;
        }

        /* Научный режим */
        .scientific-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        .toggle-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch {
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #9333ea, #4f46e5);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toggle-switch.active::after {
            left: 32px;
        }

        .scientific-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scientific-panel.show {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 15px;
        }

        .sci-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            font-weight: 500;
            padding: 15px 5px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sci-btn:hover {
            background: rgba(147, 51, 234, 0.2);
            color: white;
            border-color: rgba(147, 51, 234, 0.3);
            transform: translateY(-2px);
        }

        .sci-btn:active {
            transform: translateY(0);
        }

        /* История */
        .history-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .clear-history {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-history:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(147, 51, 234, 0.3);
            border-radius: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(147, 51, 234, 0.1);
            border-color: rgba(147, 51, 234, 0.2);
            transform: translateX(5px);
        }

        .history-expr {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .history-result {
            color: white;
            font-weight: 600;
            font-size: 16px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(22, 23, 35, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(147, 51, 234, 0.3);
            z-index: 1000;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <!-- Калькулятор -->
    <div class="calculator" id="calculator">
        <div class="premium-badge">
            <div class="premium-icon">✨</div>
            <div class="premium-text">PREMIUM <span>CALCULUX</span></div>
            <div class="time-indicator" id="timeIndicator">22:41</div>
        </div>

        <div class="display-container">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="memory-panel">
            <button class="memory-btn" onclick="memoryClear()" title="Очистить память">MC</button>
            <button class="memory-btn" onclick="memoryRecall()" title="Вспомнить">MR</button>
            <button class="memory-btn" onclick="memoryAdd()" title="Добавить в память">M+</button>
            <button class="memory-btn" onclick="memorySubtract()" title="Вычесть из памяти">M-</button>
            <span class="memory-value" id="memoryIndicator"></span>
        </div>

        <div class="buttons">
            <button class="btn function" onclick="clearAll()">AC</button>
            <button class="btn function" onclick="deleteLast()">⌫</button>
            <button class="btn function" onclick="addPercent()">%</button>
            <button class="btn operator" onclick="addOperator('/')">÷</button>
            
            <button class="btn" onclick="addNumber('7')">7</button>
            <button class="btn" onclick="addNumber('8')">8</button>
            <button class="btn" onclick="addNumber('9')">9</button>
            <button class="btn operator" onclick="addOperator('*')">×</button>
            
            <button class="btn" onclick="addNumber('4')">4</button>
            <button class="btn" onclick="addNumber('5')">5</button>
            <button class="btn" onclick="addNumber('6')">6</button>
            <button class="btn operator" onclick="addOperator('-')">−</button>
            
            <button class="btn" onclick="addNumber('1')">1</button>
            <button class="btn" onclick="addNumber('2')">2</button>
            <button class="btn" onclick="addNumber('3')">3</button>
            <button class="btn operator" onclick="addOperator('+')">+</button>
            
            <button class="btn zero" onclick="addNumber('0')">0</button>
            <button class="btn" onclick="addDecimal()">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

        <div class="scientific-toggle">
            <span class="toggle-label">
                <span>🔬</span> Научный режим
            </span>
            <div class="toggle-switch" id="scientificToggle" onclick="toggleScientific()"></div>
        </div>

        <div class="scientific-panel" id="scientificPanel">
            <button class="sci-btn" onclick="addFunction('sin(')">sin</button>
            <button class="sci-btn" onclick="addFunction('cos(')">cos</button>
            <button class="sci-btn" onclick="addFunction('tan(')">tan</button>
            <button class="sci-btn" onclick="addFunction('log(')">log</button>
            <button class="sci-btn" onclick="addFunction('ln(')">ln</button>
            <button class="sci-btn" onclick="addFunction('√(')">√</button>
            <button class="sci-btn" onclick="addOperator('^')">xⁿ</button>
            <button class="sci-btn" onclick="addNumber('π')">π</button>
            <button class="sci-btn" onclick="addNumber('e')">e</button>
            <button class="sci-btn" onclick="addFunction('!')">!</button>
            <button class="sci-btn" onclick="addFunction('(')">(</button>
            <button class="sci-btn" onclick="addFunction(')')">)</button>
        </div>

        <div class="history-section">
            <div class="history-header">
                <span>📋 ИСТОРИЯ ВЫЧИСЛЕНИЙ</span>
                <button class="clear-history" onclick="clearHistory()">ОЧИСТИТЬ</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- Уведомление -->
    <div class="toast" id="toast">
        <div class="toast-icon">✓</div>
        <span id="toastMessage">Скопировано в буфер</span>
    </div>

    <script>
        // Состояние калькулятора
        let currentExpression = '';
        let currentResult = '0';
        let memory = 0;
        let history = JSON.parse(localStorage.getItem('calcHistory')) || [];
        let isScientific = false;
        let lastClickTime = 0;

        // Обновление времени
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            document.getElementById('timeIndicator').textContent = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Показать уведомление
        function showToast(message, icon = '✓') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.querySelector('.toast-icon');
            
            toastMessage.textContent = message;
            toastIcon.innerHTML = icon;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Добавить вибрацию (если поддерживается)
        function vibrate() {
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }

        // Основные функции
        function addNumber(num) {
            vibrate();
            if (num === 'π') {
                currentExpression += 'π';
                currentResult = Math.PI.toString();
            } else if (num === 'e') {
                currentExpression += 'e';
                currentResult = Math.E.toString();
            } else {
                if (currentResult === '0' || currentResult === 'Error') {
                    currentExpression = num;
                } else {
                    currentExpression += num;
                }
            }
            updateDisplay();
        }

        function addOperator(op) {
            vibrate();
            if (currentExpression === '') return;
            
            const lastChar = currentExpression[currentExpression.length - 1];
            if ('+-*/^'.includes(lastChar)) {
                currentExpression = currentExpression.slice(0, -1) + op;
            } else {
                currentExpression += op;
            }
            updateDisplay();
        }

        function addFunction(func) {
            vibrate();
            currentExpression += func;
            updateDisplay();
        }

        function addDecimal() {
            vibrate();
            if (!currentExpression.includes('.')) {
                currentExpression += '.';
            }
            updateDisplay();
        }

        function addPercent() {
            vibrate();
            try {
                const value = eval(currentExpression) / 100;
                currentExpression = value.toString();
                calculate(true);
            } catch {
                showToast('Ошибка', '⚠️');
            }
        }

        function clearAll() {
            vibrate();
            currentExpression = '';
            currentResult = '0';
            updateDisplay();
            showToast('Очищено', '🧹');
        }

        function deleteLast() {
            vibrate();
            currentExpression = currentExpression.slice(0, -1);
            if (currentExpression === '') {
                currentResult = '0';
            }
            updateDisplay();
        }

        function calculate(silent = false) {
            vibrate();
            try {
                // Замена символов для eval
                let expr = currentExpression
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/\^/g, '**')
                    .replace(/π/g, Math.PI)
                    .replace(/e/g, Math.E)
                    .replace(/√\(/g, 'Math.sqrt(')
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(');

                // Факториал
                if (expr.includes('!')) {
                    const num = parseInt(expr);
                    let fact = 1;
                    for (let i = 2; i <= num; i++) fact *= i;
                    expr = fact.toString();
                }

                const result = eval(expr);
                
                // Форматирование результата
                if (Number.isFinite(result)) {
                    currentResult = result % 1 === 0 ? result.toString() : result.toFixed(8).replace(/\.?0+$/, '');
                    
                    // Добавить в историю
                    if (!silent && currentExpression) {
                        history.unshift({
                            expr: currentExpression,
                            result: currentResult
                        });
                        if (history.length > 10) history.pop();
                        localStorage.setItem('calcHistory', JSON.stringify(history));
                        updateHistory();
                        
                        showToast('Готово!', '✅');
                        
                        // Эффект на дисплее
                        document.querySelector('.result').style.animation = 'none';
                        setTimeout(() => {
                            document.querySelector('.result').style.animation = 'resultPop 0.2s ease';
                        }, 10);
                    }
                } else {
                    currentResult = 'Error';
                }
                
                currentExpression = currentResult;
                updateDisplay();
            } catch (e) {
                currentResult = 'Error';
                currentExpression = '';
                updateDisplay();
                showToast('Ошибка', '⚠️');
            }
        }

        // Функции памяти
        function memoryClear() {
            vibrate();
            memory = 0;
            document.getElementById('memoryIndicator').textContent = '';
            showToast('Память очищена', '💾');
        }

        function memoryRecall() {
            vibrate();
            currentExpression = memory.toString();
            currentResult = memory.toString();
            updateDisplay();
            showToast('Из памяти: ' + memory, '📎');
        }

        function memoryAdd() {
            vibrate();
            try {
                memory += parseFloat(currentResult);
                document.getElementById('memoryIndicator').textContent = 'M';
                showToast('Добавлено в память', '➕');
            } catch {}
        }

        function memorySubtract() {
            vibrate();
            try {
                memory -= parseFloat(currentResult);
                document.getElementById('memoryIndicator').textContent = 'M';
                showToast('Вычтено из памяти', '➖');
            } catch {}
        }

        // Научный режим
        function toggleScientific() {
            vibrate();
            isScientific = !isScientific;
            const toggle = document.getElementById('scientificToggle');
            const panel = document.getElementById('scientificPanel');
            
            toggle.classList.toggle('active');
            panel.classList.toggle('show');
            
            showToast(isScientific ? 'Научный режим включен' : 'Обычный режим', '🔬');
        }

        // История
        function updateHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => {
                    vibrate();
                    currentExpression = item.expr;
                    currentResult = item.result;
                    updateDisplay();
                    showToast('Загружено из истории', '📋');
                };
                
                div.innerHTML = `
                    <span class="history-expr">${item.expr}</span>
                    <span class="history-result">= ${item.result}</span>
                `;
                
                list.appendChild(div);
            });
        }

        function clearHistory() {
            vibrate();
            history = [];
            localStorage.removeItem('calcHistory');
            updateHistory();
            showToast('История очищена', '🗑️');
        }

        // Обновление дисплея
        function updateDisplay() {
            document.getElementById('expression').textContent = currentExpression || ' ';
            document.getElementById('result').textContent = currentResult;
        }

        // Копирование результата
        document.querySelector('.result').addEventListener('dblclick', () => {
            navigator.clipboard.writeText(currentResult);
            showToast('Скопировано: ' + currentResult, '📋');
            vibrate();
        });

        // Клавиатурная поддержка
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNumber(e.key);
            if (e.key === '.') addDecimal();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') addOperator(e.key);
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === '%') addPercent();
            
            // Вибрация при нажатии
            vibrate();
        });

        // Инициализация
        updateHistory();
        
        // Если есть память при загрузке
        if (memory !== 0) {
            document.getElementById('memoryIndicator').textContent = 'M';
        }

        // Создание частиц фона
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 15 + Math.random() * 20 + 's';
            particle.style.opacity = Math.random() * 0.3;
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
